# InDE v3.16 Nginx HTTPS Configuration
# Generated by Certbot — maintained as repository template.
# Apply: sudo cp deployment/nginx/inde-ssl.conf /etc/nginx/sites-available/inde
#
# IMPORTANT: Replace 'app.indeverse.com' with your actual domain before applying.
# The certificate paths must match the domain used with certbot.

server {
    listen 80;
    server_name app.indeverse.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.indeverse.com;

    ssl_certificate /etc/letsencrypt/live/app.indeverse.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.indeverse.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # API traffic
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # WebSocket — wss:// in production (protocol derived from window.location in frontend)
    location /ws/ {
        proxy_pass http://127.0.0.1:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location / {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}
