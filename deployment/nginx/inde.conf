# InDE v3.16 Nginx Configuration (HTTP)
# Apply to: /etc/nginx/sites-available/inde
# After HTTPS setup (Phase 4), this file is replaced by the HTTPS version.
# See deployment/nginx/inde-ssl.conf for the post-certbot configuration.

server {
    listen 80;
    server_name _;

    # API traffic → FastAPI app container
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket connections — must match ALL ws paths with trailing slash
    location /ws/ {
        proxy_pass http://127.0.0.1:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;    # 24h — required for long-lived coaching sessions
        proxy_send_timeout 86400;
    }

    # All other traffic → React frontend (served as static files by app container)
    location / {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
